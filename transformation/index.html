<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >
  <title>Transformation</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="page-transformation-view">
  <div class="page-scale-shell">
    <div class="page-scale-stage">
      <div class="page-scale-frame">
        <div class="page-transformation">

          <header class="site-header site-header--dark" aria-label="Hauptnavigation">
            <div class="site-header__inner">
              <a class="site-logo-link" href="../index.html" aria-label="Zur Landingpage">
                <img class="site-logo" src="../images/logo_schwarz.png" alt="">
              </a>

              <nav class="site-nav" aria-label="Primäre Navigation">
                <a href="../about/index.html">ABOUT</a>
                <a href="../textilsystem/index.html">TEXTILSYSTEM</a>
                <a href="../forschung/index.html">FORSCHUNG</a>
                <a href="../transformation/index.html">TRANSFORMATION</a>
                <a href="../aktivitaet/index.html">AKTIVITÄT-&gt;</a>
              </nav>

              <button
                class="menu-toggle"
                type="button"
                aria-expanded="false"
                aria-controls="mobile-menu"
                aria-label="Navigation öffnen"
              >
                <img class="menu-toggle__icon" src="../images/burger_schwarz.png" alt="">
              </button>

              <nav class="mobile-nav" id="mobile-menu" aria-label="Mobile Navigation">
                <a href="../about/index.html">ABOUT</a>
                <a href="../textilsystem/index.html">TEXTILSYSTEM</a>
                <a href="../forschung/index.html">FORSCHUNG</a>
                <a href="../transformation/index.html">TRANSFORMATION</a>
                <a href="../aktivitaet/index.html">AKTIVITÄT-&gt;</a>
              </nav>
            </div>
          </header>

          <main class="transformation-main">
            <section class="transformation-stage" aria-label="Transformation Bildkomposition">

              <img
                class="transformation-image transformation-image--e1-1 reveal reveal-fade"
                src="../images/E1_1.png"
                alt=""
                loading="eager"
              >

              <img
                class="transformation-image transformation-image--e1-2 reveal reveal-fade transformation-reveal--slow transformation-reveal--delay-1"
                src="../images/E1_2.png"
                alt=""
                loading="eager"
              >

              <div class="transformation-module transformation-module--e1-3 reveal reveal-bottom-left transformation-reveal--fast">
                <img
                  class="transformation-image transformation-image--e1-3 pointing-diagonal-hover"
                  src="../images/E1_3.png"
                  alt=""
                  loading="lazy"
                >
              </div>

              <img
                class="transformation-image transformation-image--e1-4 reveal reveal-bottom-left transformation-reveal--fast transformation-reveal--delay-2"
                src="../images/E1_4.png"
                alt=""
                loading="lazy"
              >

              <img
                class="transformation-image transformation-image--e2-1 reveal reveal-from-left transformation-sequence--1"
                src="../images/E2_1.png"
                alt=""
                loading="lazy"
              >

              <img
                class="transformation-image transformation-image--e2-2 reveal reveal-from-left transformation-sequence--2"
                src="../images/E2_2.png"
                alt=""
                loading="lazy"
              >

              <div class="transformation-module transformation-module--e2-3 reveal reveal-from-left transformation-sequence--3">
                <img
                  class="transformation-image transformation-image--e2-3 wiggle-hover"
                  src="../images/E2_3.png"
                  alt=""
                  loading="lazy"
                >
              </div>

              <div class="transformation-module transformation-module--e2-4 reveal reveal-from-left transformation-sequence--4">
                <img
                  class="transformation-image transformation-image--e2-4 wiggle-hover"
                  src="../images/E2_4.png"
                  alt=""
                  loading="lazy"
                >
              </div>

              <div class="transformation-module transformation-module--e2-5 reveal reveal-from-left transformation-sequence--5">
                <img
                  class="transformation-image transformation-image--e2-5 wiggle-hover"
                  src="../images/E2_5.png"
                  alt=""
                  loading="lazy"
                >
              </div>

            </section>
          </main>

          <footer class="site-footer" aria-hidden="true">
            <img class="site-footer__image" src="../images/footer_box.png" alt="" loading="lazy">
          </footer>

        </div>
      </div>
    </div>
  </div>

  <script src="../js/script.js" defer></script>
</body>
</html>
