<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >
  <title>Aktivität</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="page-aktivitaet-view">
  <div class="page-scale-shell">
    <div class="page-scale-stage">
      <div class="page-scale-frame">
        <div class="page-aktivitaet">

          <header class="site-header site-header--dark" aria-label="Hauptnavigation">
            <div class="site-header__inner">
              <a class="site-logo-link" href="../index.html" aria-label="Zur Landingpage">
                <img class="site-logo" src="../images/logo_schwarz.png" alt="">
              </a>

              <nav class="site-nav" aria-label="Primäre Navigation">
                <a href="../about/index.html">ABOUT</a>
                <a href="../textilsystem/index.html">TEXTILSYSTEM</a>
                <a href="../forschung/index.html">FORSCHUNG</a>
                <a href="../transformation/index.html">TRANSFORMATION</a>
                <a href="../aktivitaet/index.html">AKTIVITÄT-&gt;</a>
              </nav>

              <button
                class="menu-toggle"
                type="button"
                aria-expanded="false"
                aria-controls="mobile-menu"
                aria-label="Navigation öffnen"
              >
                <img class="menu-toggle__icon" src="../images/burger_schwarz.png" alt="">
              </button>

              <nav class="mobile-nav" id="mobile-menu" aria-label="Mobile Navigation">
                <a href="../about/index.html">ABOUT</a>
                <a href="../textilsystem/index.html">TEXTILSYSTEM</a>
                <a href="../forschung/index.html">FORSCHUNG</a>
                <a href="../transformation/index.html">TRANSFORMATION</a>
                <a href="../aktivitaet/index.html">AKTIVITÄT-&gt;</a>
              </nav>
            </div>
          </header>

          <main class="aktivitaet-main">
            <section class="aktivitaet-stage" aria-label="Aktivität Bildkomposition">

              <div class="activity-backgrounds" aria-hidden="true">
                <img class="activity-background activity-background--fa" src="../images/FA.png" alt="" loading="eager">
                <img class="activity-background activity-background--fb" src="../images/FB.png" alt="" loading="eager">
                <img class="activity-background activity-background--fc" src="../images/FC.png" alt="" loading="lazy">
                <img class="activity-background activity-background--fd" src="../images/FD.png" alt="" loading="lazy">
                <img class="activity-background activity-background--fe" src="../images/FE.png" alt="" loading="lazy">
                <img class="activity-background activity-background--ff" src="../images/FF.png" alt="" loading="lazy">
                <img class="activity-background activity-background--fg" src="../images/FG.png" alt="" loading="lazy">
                <img class="activity-background activity-background--fh" src="../images/FH.png" alt="" loading="lazy">
                <img class="activity-background activity-background--fi" src="../images/FI.png" alt="" loading="lazy">
                <img class="activity-background activity-background--fj" src="../images/FJ.png" alt="" loading="lazy">
                <img class="activity-background activity-background--fk" src="../images/FK.png" alt="" loading="lazy">
                <img class="activity-background activity-background--fl" src="../images/FL.png" alt="" loading="lazy">
              </div>

              <div class="activity-module activity-module--f1 reveal reveal-fade">
                <img
                  class="activity-image activity-image--f1 wiggle-hover"
                  src="../images/F1.png"
                  alt=""
                  loading="eager"
                >
              </div>

            </section>
          </main>

          <footer class="site-footer" aria-hidden="true">
            <img class="site-footer__image" src="../images/footer_box.png" alt="" loading="lazy">
          </footer>

        </div>
      </div>
    </div>
  </div>

  <script src="../js/script.js" defer></script>
</body>
</html>
