<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >
  <title>Textilsystem</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="page-textilsystem-view">
  <div class="page-scale-shell">
    <div class="page-scale-stage">
      <div class="page-scale-frame">
        <div class="page-textilsystem">

          <header class="site-header site-header--dark" aria-label="Hauptnavigation">
            <div class="site-header__inner">
              <a class="site-logo-link" href="../index.html" aria-label="Zur Landingpage">
                <img class="site-logo" src="../images/logo_schwarz.png" alt="">
              </a>

              <nav class="site-nav" aria-label="Primäre Navigation">
                <a href="../about/index.html">ABOUT</a>
                <a href="../textilsystem/index.html">TEXTILSYSTEM</a>
                <a href="../forschung/index.html">FORSCHUNG</a>
                <a href="../transformation/index.html">TRANSFORMATION</a>
                <a href="../aktivitaet/index.html">AKTIVITÄT-&gt;</a>
              </nav>

              <button
                class="menu-toggle"
                type="button"
                aria-expanded="false"
                aria-controls="mobile-menu"
                aria-label="Navigation öffnen"
              >
                <img class="menu-toggle__icon" src="../images/burger_schwarz.png" alt="">
              </button>

              <nav class="mobile-nav" id="mobile-menu" aria-label="Mobile Navigation">
                <a href="../about/index.html">ABOUT</a>
                <a href="../textilsystem/index.html">TEXTILSYSTEM</a>
                <a href="../forschung/index.html">FORSCHUNG</a>
                <a href="../transformation/index.html">TRANSFORMATION</a>
                <a href="../aktivitaet/index.html">AKTIVITÄT-&gt;</a>
              </nav>
            </div>
          </header>

          <main class="textilsystem-main">
            <section class="textilsystem-stage" aria-label="Textilsystem Bildkomposition">

              <img
                class="textil-image textil-image--c1"
                src="../images/C1.png"
                alt=""
                loading="eager"
              >

              <img
                class="textil-image textil-image--c1-2 reveal reveal-fade"
                src="../images/C1_2.png"
                alt=""
                loading="lazy"
              >

              <div class="textil-module textil-module--c1-3 reveal reveal-fade">
                <img
                  class="textil-image textil-image--c1-3 wiggle-hover"
                  src="../images/C1_3.png"
                  alt=""
                  loading="lazy"
                >
              </div>

              <img
                class="textil-image textil-image--c2"
                src="../images/C2.png"
                alt=""
                loading="lazy"
              >

              <img
                class="textil-image textil-image--c2-2 reveal reveal-fade"
                src="../images/C2_2.png"
                alt=""
                loading="lazy"
              >

              <img
                class="textil-image textil-image--c2-3 reveal reveal-from-right"
                src="../images/C2_3.png"
                alt=""
                loading="lazy"
              >

              <img
                class="textil-image textil-image--c3"
                src="../images/C3.png"
                alt=""
                loading="lazy"
              >

              <img
                class="textil-image textil-image--c3-2 reveal reveal-from-left"
                src="../images/C3_2.png"
                alt=""
                loading="lazy"
              >

              <div class="textil-module textil-module--c3-3 reveal reveal-from-right">
                <img
                  class="textil-image textil-image--c3-3 wiggle-hover"
                  src="../images/C3_3.png"
                  alt=""
                  loading="lazy"
                >
              </div>

              <div class="textil-module textil-module--c3-4 reveal reveal-down">
                <img
                  class="textil-image textil-image--c3-4 pointing-hover"
                  src="../images/C3_4.png"
                  alt=""
                  loading="lazy"
                >
              </div>

              <img
                class="textil-image textil-image--c4"
                src="../images/C4.png"
                alt=""
                loading="lazy"
              >

              <img
                class="textil-image textil-image--c4-2 reveal reveal-fade"
                src="../images/C4_2.png"
                alt=""
                loading="lazy"
              >

              <img
                class="textil-image textil-image--c4-3 reveal reveal-down"
                src="../images/C4_3.png"
                alt=""
                loading="lazy"
              >

              <img
                class="textil-image textil-image--c5"
                src="../images/C5.png"
                alt=""
                loading="lazy"
              >

              <img
                class="textil-image textil-image--c6 reveal reveal-bottom-left"
                src="../images/C6.png"
                alt=""
                loading="lazy"
              >

              <img
                class="textil-image textil-image--c6-2 reveal reveal-bottom-left reveal-delay-2"
                src="../images/C6_2.png"
                alt=""
                loading="lazy"
              >

            </section>
          </main>

          <footer class="site-footer" aria-hidden="true">
            <img
              class="site-footer__image"
              src="../images/footer_box.png"
              alt=""
              loading="lazy"
            >
          </footer>

        </div>
      </div>
    </div>
  </div>

  <script src="../js/script.js" defer></script>
</body>
</html>
