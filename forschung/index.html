<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >
  <title>Forschung</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body class="page-forschung-view">
  <div class="page-scale-shell">
    <div class="page-scale-stage">
      <div class="page-scale-frame">
        <div class="page-forschung">

          <header class="site-header site-header--dark" aria-label="Hauptnavigation">
            <div class="site-header__inner">
              <a class="site-logo-link" href="../index.html" aria-label="Zur Landingpage">
                <img class="site-logo" src="../images/logo_schwarz.png" alt="">
              </a>

              <nav class="site-nav" aria-label="Primäre Navigation">
                <a href="../about/index.html">ABOUT</a>
                <a href="../textilsystem/index.html">TEXTILSYSTEM</a>
                <a href="../forschung/index.html">FORSCHUNG</a>
                <a href="../transformation/index.html">TRANSFORMATION</a>
                <a href="../aktivitaet/index.html">AKTIVITÄT-&gt;</a>
              </nav>

              <button
                class="menu-toggle"
                type="button"
                aria-expanded="false"
                aria-controls="mobile-menu"
                aria-label="Navigation öffnen"
              >
                <img class="menu-toggle__icon" src="../images/burger_schwarz.png" alt="">
              </button>

              <nav class="mobile-nav" id="mobile-menu" aria-label="Mobile Navigation">
                <a href="../about/index.html">ABOUT</a>
                <a href="../textilsystem/index.html">TEXTILSYSTEM</a>
                <a href="../forschung/index.html">FORSCHUNG</a>
                <a href="../transformation/index.html">TRANSFORMATION</a>
                <a href="../aktivitaet/index.html">AKTIVITÄT-&gt;</a>
              </nav>
            </div>
          </header>

          <main class="forschung-main">
            <section class="forschung-stage" aria-label="Forschung Bildkomposition">

              <div class="research-backgrounds" aria-hidden="true">
                <img
                  class="research-background research-background--da"
                  src="../images/DA.png"
                  alt=""
                  fetchpriority="high"
                  loading="eager"
                >

                <img
                  class="research-background research-background--db"
                  src="../images/DB.png"
                  alt=""
                  loading="eager"
                >

                <img
                  class="research-background research-background--dc"
                  src="../images/DC.png"
                  alt=""
                  loading="lazy"
                >

                <img
                  class="research-background research-background--dd"
                  src="../images/DD.png"
                  alt=""
                  loading="lazy"
                >

                <img
                  class="research-background research-background--de"
                  src="../images/DE.png"
                  alt=""
                  loading="lazy"
                >

                <img
                  class="research-background research-background--df"
                  src="../images/DF.png"
                  alt=""
                  loading="lazy"
                >
              </div>

              <img
                class="research-image research-image--d1-1 reveal reveal-top-right"
                src="../images/D1_1.png"
                alt=""
                loading="lazy"
              >

              <img
                class="research-image research-image--d1-2 reveal reveal-fade"
                src="../images/D1_2.png"
                alt=""
                loading="lazy"
              >

              <img
                class="research-image research-image--d1-3 reveal reveal-top-right"
                src="../images/D1_3.png"
                alt=""
                loading="lazy"
              >

              <img
                class="research-image research-image--d1-4 reveal reveal-fade"
                src="../images/D1_4.png"
                alt=""
                loading="lazy"
              >

              <img
                class="research-image research-image--d2-1 reveal reveal-from-left"
                src="../images/D2_1.png"
                alt=""
                loading="lazy"
              >

              <img
                class="research-image research-image--d2-2 wiggle-hover"
                src="../images/D2_2.png"
                alt=""
                loading="lazy"
              >

              <img
                class="research-image research-image--d2-3 reveal reveal-from-left"
                src="../images/D2_3.png"
                alt=""
                loading="lazy"
              >

              <img
                class="research-image research-image--d2-4 reveal reveal-from-left reveal-delay-2"
                src="../images/D2_4.png"
                alt=""
                loading="lazy"
              >

              <img
                class="research-image research-image--d2-5 reveal reveal-top-left"
                src="../images/D2_5.png"
                alt=""
                loading="lazy"
              >

              <img
                class="research-image research-image--d2-6 reveal reveal-from-left"
                src="../images/D2_6.png"
                alt=""
                loading="lazy"
              >

              <img
                class="research-image research-image--d2-7 reveal reveal-from-left reveal-delay-2"
                src="../images/D2_7.png"
                alt=""
                loading="lazy"
              >

              <img
                class="research-image research-image--d3-1 reveal reveal-fade"
                src="../images/D3_1.png"
                alt=""
                loading="lazy"
              >

              <div class="research-module research-module--d3-2 reveal reveal-fade">
                <img
                  class="research-image research-image--d3-2 wiggle-hover"
                  src="../images/D3_2.png"
                  alt=""
                  loading="lazy"
                >
              </div>

              <div class="research-module research-module--d3-3 reveal reveal-fade">
                <img
                  class="research-image research-image--d3-3 wiggle-hover"
                  src="../images/D3_3.png"
                  alt=""
                  loading="lazy"
                >
              </div>

              <img
                class="research-image research-image--d3-4 reveal reveal-top-right"
                src="../images/D3_4.png"
                alt=""
                loading="lazy"
              >

            </section>
          </main>

          <footer class="site-footer" aria-hidden="true">
            <img
              class="site-footer__image"
              src="../images/footer_box.png"
              alt=""
              loading="lazy"
            >
          </footer>

        </div>
      </div>
    </div>
  </div>

  <script src="../js/script.js" defer></script>
</body>
</html>
